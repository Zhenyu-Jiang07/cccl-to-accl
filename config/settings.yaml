project:
  name: cccl-to-accl
  mode: os_h_mvp

paths:
  mylearn_repo: /home/zhenyu/projects/mylearn
  source_file: examples/input_cccl_os.h
  expected_file: examples/expected_accl_os.h
  target_relpath: libascendcxx/include/ascend/std/__accl/os.h
  output_dir: outputs

repo_verify:
  conda_env: asc_cccl_env
  branch_prefix: feature/ai
  push_remote: origin
  commit_message_template: "add {filename}"
  base_branch: develop

retry:
  max_fix_rounds: 1

model:
  provider: zai
  model_name: glm-5